# nginx.conf – placed inside /etc/nginx/conf.d/default.conf
# Redirects all unknown paths back to index.html so React Router can handle them.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Serve static files; fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Gzip for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
